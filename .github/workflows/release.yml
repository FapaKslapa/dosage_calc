name: Release

# Triggers when you push a tag like v1.0.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    name: Build APK & publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      # ── Unit tests ──────────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew :app:test --no-daemon

      # ── Build ───────────────────────────────────────────────────────────────
      # Builds an unsigned release APK.
      # To distribute on the Play Store you will need to sign it:
      # store your keystore as a base64 GitHub Secret and add a signing step.
      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon

      # ── Rename artifact with version tag ───────────────────────────────────
      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME}   # e.g. v1.0.0
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/DosageCalc-${TAG}.apk

      # ── GitHub Release ──────────────────────────────────────────────────────
      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}   # strip leading 'v'
          # Extract the block between this version header and the next
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to a temp file to avoid multiline quoting issues
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DosageCalc ${{ github.ref_name }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: app/build/outputs/apk/release/DosageCalc-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
